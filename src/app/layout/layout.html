<div class="d-flex" style="min-height: 100vh;">
  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column flex-shrink-0 p-3 bg-dark text-white">
    <a class="navbar-brand d-flex align-items-center mb-3 px-2 text-white text-decoration-none" routerLink="/">
      <i class="bi bi-truck me-2 fs-4"></i>
      <span class="fs-5 fw-bold">FreightTrack</span>
    </a>
    <hr class="text-secondary my-2">
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a class="nav-link text-white" routerLink="/shipments" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <i class="bi bi-box-seam me-2"></i>
          All Shipments
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" routerLink="/shipments/new" routerLinkActive="active">
          <i class="bi bi-plus-circle me-2"></i>
          New Shipment
        </a>
      </li>
    </ul>
    <hr class="text-secondary my-2">
    <div class="px-2">
      <div class="d-flex align-items-center text-white mb-2 small">
        <i class="bi bi-person-circle me-2 fs-5"></i>
        <span>User</span>
      </div>
      <button class="btn btn-outline-light btn-sm w-100" (click)="logout()">
        <i class="bi bi-box-arrow-right me-1"></i> Sign Out
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="d-flex flex-column flex-grow-1">
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom shadow-sm px-4 py-2">
      <div class="container-fluid p-0">
        <span class="navbar-text text-muted small">
          <i class="bi bi-house-door me-1"></i> Dashboard
        </span>
        <div class="d-flex align-items-center gap-3">
          <span class="badge bg-primary rounded-pill">Admin</span>
        </div>
      </div>
    </nav>

    <!-- Content Area -->
    <main class="flex-grow-1 bg-light">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
